<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

html, body { height: 100%; margin: 0; }
#map { height: 100%; width: 100%; }

.panel {
  position: fixed;
  top: 15px;
  left: 15px;
  z-index: 9999;
  width: 360px;
  padding: 18px;
  background: #ffffff;
  border-radius: 14px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.18);
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  color: #333;
  max-height: calc(100vh - 40px);
  overflow-y: auto;
}

.panel .title {
  font-size: 16px;
  font-weight: 700;
  color: #002147;
  margin-bottom: 12px;
  letter-spacing: 0.4px;
}

.panel .lbl {
  font-weight: 600;
  margin: 12px 0 6px;
  color: #444;
}

/* hint sous le label commune */
.hint {
  font-size: 11px;
  color: #888;
  margin: -4px 0 6px;
  font-style: italic;
}

.panel select {
  width: 100%;
  padding: 8px 10px;
  border-radius: 8px;
  border: 1px solid #dcdcdc;
  background: #f9f9f9;
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  transition: all 0.2s ease;
}

.panel select:focus {
  border-color: #0057B8;
  background: #ffffff;
  outline: none;
  box-shadow: 0 0 0 2px rgba(0,87,184,0.15);
}

/* multi-select commune */
#comSelect {
  height: 120px;   /* affiche ~6 lignes */
}

/* badges communes sélectionnées */
#comBadges {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  margin-top: 6px;
  min-height: 0;
}

.badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: #eef3fb;
  border: 1px solid #cdd9ee;
  border-radius: 20px;
  padding: 3px 10px 3px 10px;
  font-size: 12px;
  font-weight: 600;
  color: #002147;
}

.badge .x {
  cursor: pointer;
  font-weight: 700;
  color: #0057B8;
  margin-left: 2px;
  font-size: 13px;
  line-height: 1;
}
.badge .x:hover { color: #c0392b; }

.row {
  display: flex;
  gap: 10px;
  margin-top: 15px;
}

.btn {
  flex: 1;
  padding: 8px;
  border-radius: 8px;
  border: none;
  background: #0057B8;
  color: white;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s ease;
}

.btn:hover { background: #003e86; }

.count {
  flex: 1;
  padding: 8px;
  border-radius: 8px;
  background: #eef3fb;
  color: #002147;
  font-weight: 700;
  text-align: center;
  border: 1px solid #cdd9ee;
}

/* labels permanents (tooltip) */
.leaflet-tooltip.lbl {
  background: rgba(255,255,255,0.92);
  border: 1px solid rgba(0,0,0,0.25);
  border-radius: 6px;
  padding: 2px 6px;
  font-weight: 600;
  font-size: 11px;
  color: #111;
  box-shadow: 0 4px 14px rgba(0,0,0,0.12);
}
</style>
</head>

<body>
<div id="map"></div>

<div class="panel">
  <div class="title">Centres de vote 2025</div>

  <div class="lbl">Département</div>
  <select id="depSelect"><option value="__ALL__">Tous</option></select>

  <div class="lbl">Commune(s)</div>
  <div class="hint">Ctrl+clic (ou Cmd+clic) pour sélection multiple</div>
  <select id="comSelect" multiple></select>
  <div id="comBadges"></div>

  <div class="lbl">Section communale</div>
  <select id="secSelect"><option value="__ALL__">Toutes</option></select>

  <div class="row">
    <button class="btn" id="resetBtn">reset</button>
    <div class="count" id="countBox">0</div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

, {"lat": 18.1430421, "lon": -71.7573004, "dep": "SUD-EST", "com": "ANSE-À-PITRE", "sec": "1re Boucan Guillaume", "tip": "ECOLE NATIONALE DE BANANE", "popup": "<b>ECOLE NATIONALE DE BANANE<\/b><br>dep: SUD-EST<br>com: ANSE-À-PITRE<br>sec: 1re Boucan Guillaume<br>telephone: (+509) 4655-7695 / 4655-7695"}, {"lat": 18.2353788, "lon": -71.787392, "dep": "SUD-EST", "com": "ANSE-À-PITRE", "sec": "2e Bois d'Orme", "tip": "ECOLE NATIONALE DE PLATON CÈDRE", "popup": "<b>ECOLE NATIONALE DE PLATON CÈDRE<\/b><br>dep: SUD-EST<br>com: ANSE-À-PITRE<br>sec: 2e Bois d'Orme<br>telephone: (+509) 3836-2778 / 3190-1132"}, {"lat": 18.2116544, "lon": -71.8241126, "dep": "SUD-EST", "com": "ANSE-À-PITRE", "sec": "2e Bois d'Orme", "tip": "ECOLE NATIONALE DE BOIS D'ORME", "popup": "<b>ECOLE NATIONALE DE BOIS D'ORME<\/b><br>dep: SUD-EST<br>com: ANSE-À-PITRE<br>sec: 2e Bois d'Orme<br>telephone: (+509) 3129-2130 / 3681-0680"}, {"lat": 18.1856007, "lon": -71.7985063, "dep": "SUD-EST", "com": "ANSE-À-PITRE", "sec": "2e Bois d'Orme", "tip": "ECOLE NATIONALE DE BAS BOIS D'ORME", "popup": "<b>ECOLE NATIONALE DE BAS BOIS D'ORME<\/b><br>dep: SUD-EST<br>com: ANSE-À-PITRE<br>sec: 2e Bois d'Orme<br>telephone: (+509) 3782-1699 / 4105-3639"}, {"lat": 18.0474044, "lon": -71.7568011, "dep": "SUD-EST", "com": "ANSE-À-PITRE", "sec": "Ville", "tip": "LYCÉE NATIONAL DE ANSE-À-PITRE", "popup": "<b>LYCÉE NATIONAL DE ANSE-À-PITRE<\/b><br>dep: SUD-EST<br>com: ANSE-À-PITRE<br>sec: Ville<br>telephone: (+509) 3818-8233 / 3818-8740"}];

// carte
const map = L.map('map').setView([18.955420883333332, -72.83014525030582], 7);

// fonds
const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19, attribution: '&copy; OpenStreetMap'
}).addTo(map);

const esri = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
  maxZoom: 19, attribution: 'Esri'
});

L.control.layers({ "plan (OSM)": osm, "satellite (Esri)": esri }, null, {collapsed:false}).addTo(map);

// cluster
const cluster = L.markerClusterGroup();
map.addLayer(cluster);

// ui
const depSelect  = document.getElementById("depSelect");
const comSelect  = document.getElementById("comSelect");
const comBadges  = document.getElementById("comBadges");
const secSelect  = document.getElementById("secSelect");
const countBox   = document.getElementById("countBox");

// ---- utilitaires ----
function uniqSorted(arr) {
  return Array.from(new Set(arr.filter(v => v && v.trim() !== ""))).sort((a,b)=>a.localeCompare(b));
}

function sel(v) { return (v === "__ALL__") ? "" : v; }

// retourne le tableau des communes sélectionnées dans comSelect (multi)
function selectedCommunes() {
  return Array.from(comSelect.selectedOptions).map(o => o.value);
}

// ---- badges communes sélectionnées ----
function renderBadges() {
  const coms = selectedCommunes();
  comBadges.innerHTML = "";
  for (const c of coms) {
    const badge = document.createElement("span");
    badge.className = "badge";
    badge.innerHTML = `${c}<span class="x" data-com="${c}">×</span>`;
    comBadges.appendChild(badge);
  }
  // clic sur × -> désélectionne la commune
  comBadges.querySelectorAll(".x").forEach(el => {
    el.addEventListener("click", () => {
      const c = el.dataset.com;
      const opt = Array.from(comSelect.options).find(o => o.value === c);
      if (opt) opt.selected = false;
      onComChange();
    });
  });
}

// ---- options select (simple) ----
function setOptions(selectEl, values, allLabel) {
  const prev = selectEl.value || "__ALL__";
  selectEl.innerHTML = "";
  const opt0 = document.createElement("option");
  opt0.value = "__ALL__"; opt0.textContent = allLabel;
  selectEl.appendChild(opt0);
  for (const v of values) {
    const o = document.createElement("option");
    o.value = v; o.textContent = v;
    selectEl.appendChild(o);
  }
  const exists = Array.from(selectEl.options).some(o => o.value === prev);
  selectEl.value = exists ? prev : "__ALL__";
}

// ---- options comSelect MULTI ----
function setComOptions(values) {
  // mémoriser sélection actuelle
  const prev = new Set(selectedCommunes());
  comSelect.innerHTML = "";
  for (const v of values) {
    const o = document.createElement("option");
    o.value = v; o.textContent = v;
    o.selected = prev.has(v);
    comSelect.appendChild(o);
  }
}

// ---- cascade ----
function possibleCommunes(dep) {
  const subset = dep ? pts.filter(p => p.dep === dep) : pts;
  return uniqSorted(subset.map(p => p.com));
}

function possibleSections(dep, coms) {
  let subset = pts;
  if (dep)         subset = subset.filter(p => p.dep === dep);
  if (coms.length) subset = subset.filter(p => coms.includes(p.com));
  return uniqSorted(subset.map(p => p.sec));
}

function applyCascadeOptions() {
  const dep  = sel(depSelect.value);
  const coms = selectedCommunes();
  setComOptions(possibleCommunes(dep));
  // re-sélectionner celles qui existent encore
  const availComs = new Set(possibleCommunes(dep));
  Array.from(comSelect.options).forEach(o => {
    o.selected = coms.includes(o.value) && availComs.has(o.value);
  });
  setOptions(secSelect, possibleSections(dep, selectedCommunes()), "Toutes");
}

// ---- réglages labels ----
const LABEL_ZOOM = 14;
const MAX_LABELS = 250;

// ---- filtre principal ----
// fitMap=true  -> recentre la carte sur les résultats (changement de filtre)
// fitMap=false -> recalcule uniquement les labels sans toucher à la vue (zoomend)
function applyFilter(fitMap) {
  if (fitMap === undefined) fitMap = true;

  const dep  = sel(depSelect.value);
  const coms = selectedCommunes();
  const sec  = sel(secSelect.value);

  cluster.clearLayers();
  const bounds = [];

  let kept = 0;
  for (const p of pts) {
    const ok = (!dep  || p.dep === dep) &&
               (!coms.length || coms.includes(p.com)) &&
               (!sec  || p.sec === sec);
    if (ok) kept++;
  }
  countBox.textContent = kept.toString();

  const z = map.getZoom();
  const showLabels =
    (sec && kept <= MAX_LABELS) ||
    ((z >= LABEL_ZOOM) && (coms.length || dep) && kept <= MAX_LABELS);

  for (const p of pts) {
    const ok = (!dep  || p.dep === dep) &&
               (!coms.length || coms.includes(p.com)) &&
               (!sec  || p.sec === sec);
    if (!ok) continue;

    const mk = L.marker([p.lat, p.lon]).bindPopup(p.popup);

    if (showLabels) {
      mk.bindTooltip(p.tip, {
        permanent: true,
        direction: "top",
        offset: [0, -10],
        opacity: 0.95,
        className: "lbl"
      }).openTooltip();
    } else {
      mk.bindTooltip(p.tip);
    }

    cluster.addLayer(mk);
    bounds.push([p.lat, p.lon]);
  }

  // recentrer seulement quand c'est un vrai changement de filtre
  if (fitMap && bounds.length > 0) {
    map.fitBounds(L.latLngBounds(bounds), {padding:[40,40]});
  }
}

// ---- handlers ----
function onDepChange() {
  // réinitialiser communes et sections
  applyCascadeOptions();
  // désélectionner toutes les communes
  Array.from(comSelect.options).forEach(o => o.selected = false);
  secSelect.value = "__ALL__";
  renderBadges();
  applyFilter();
}

function onComChange() {
  const dep  = sel(depSelect.value);
  const coms = selectedCommunes();
  setOptions(secSelect, possibleSections(dep, coms), "Toutes");
  renderBadges();
  applyFilter();
}

function onSecChange() {
  applyFilter();
}

function resetAll() {
  depSelect.value = "__ALL__";
  Array.from(comSelect.options).forEach(o => o.selected = false);
  secSelect.value = "__ALL__";
  applyCascadeOptions();
  renderBadges();
  applyFilter();
  map.setView([18.955420883333332, -72.83014525030582], 7);
}

// ---- init ----
setOptions(depSelect, uniqSorted(pts.map(p => p.dep)), "Tous");
applyCascadeOptions();
applyFilter();

// ---- events ----
depSelect.addEventListener("change", onDepChange);
comSelect.addEventListener("change", onComChange);
secSelect.addEventListener("change", onSecChange);
document.getElementById("resetBtn").addEventListener("click", resetAll);

// zoomend : recalcule les labels SANS recentrer la carte
map.on("zoomend", () => applyFilter(false));
</script>
